   <main class="position-relative">
    <div class="start position-absolute top-0 start-0 w-100 ">
        <h1 class="fw-bold text-center my-5">
           OWL Hunt
          <img src="./images/sm_owl.png" alt="Owl" width="50" height="50" class="me-2">
        </h1>
          <div class="row flex-row">
          
             <div class="start_container col-12 col-md-6 order-md-1 d-flex justify-content-center align-items-center">
                    <div class="start_inner">
                        <div class="form rounded-4 py-5">
                        <h3 class="fw-bold text-center mb-4">let's hunt</h3>
                        <div class="mb-4">
                            <input type="text" class="form-control w-75 mx-auto" id="name" placeholder="Hunter Name">
                        </div>
                        <select class="form-select form-select mb-4 w-75 m-auto select_level " aria-label=".form-select-lg example " id="level">
                            <option value="easy">Easy</option>
                            <option value="medium">Medium</option>
                            <option value="hard">Hard</option>
                            <option value="" selected disabled>Choose Game Level</option>
                          </select>
                        <button class="btn btn-primary d-block mx-auto fw-bold" id="start_btn">Start Game</button>
                    </div>
                  </div>
             </div>

             <div class="top_five start_container col-12 col-md-6 d-flex flex-column justify-content-center align-items-center">
              <h2 class="fw-bold text-center mb-3"><i class="fas fa-trophy me-2"></i>Top 5</h2>
              <div class="top_items  d-flex flex-column">
               <!-- render top five -->
              </div> 
            </div>
             
          </div>
        </div>

                            </div>
                            <div class="stat-item">

                            </div>

                    </div>

            </div>
